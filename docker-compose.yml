version: '3.8'

services:
  db:
    image: postgres:15
    container_name: aeromiles-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - aeromiles_data:/var/lib/postgresql/data

volumes:
  aeromiles_data: